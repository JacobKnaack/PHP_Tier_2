<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/reset.css">
    <link rel="stylesheet" href="assets/styles/calculator.css">
    <script src="assets/js/calculator.js"></script>
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <div id="loading-progress">
        <p>calculating...</p>
    </div>
    <form id="calculator-form" method="POST" action="/api/expression">
        <section id="expression">
            <p id="expression-values"></p>
            <input id="expression-input" type="text" name="expression-input" placeholder="0.00" readonly>
        </section>
        <section id="numbers">
            <button class="number-bttn" type="button" id="one-button" value="1">
                <p>1</p>
            </button>
            <button class="number-bttn" type="button" id="two-button" value="2">
                <p>2</p>
            </button>
            <button class="number-bttn" type="button" id="three-button" value="3">
                <p>3</p>
            </button>
            <button class="number-bttn" type="button" id="four-button" value="4">
                <p>4</p>
            </button>
            <button class="number-bttn" type="button" id="five-button" value="5">
                <p>5</p>
            </button>
            <button class="number-bttn" type="button" id="six-button" value="6">
                <p>6</p>
            </button>
            <button class="number-bttn" type="button" id="seven-button" value="7">
                <p>7</p>
            </button>
            <button class="number-bttn" type="button" id="eight-button" value="8">
                <p>8</p>
            </button>
            <button class="number-bttn" type="button" id="nine-button" value="9">
                <p>9</p>
            </button>
            <button class="number-bttn" type="button" id="zero-button" value="0">
                <p>0</p>
            </button>
            <button class="number-bttn" type="button" id="decimal-button" value=".">
                <p>.</p>
            </button>
        </section>
        <section id="operations">
            <button class="operation-bttn" type="button" id="clear-button">
                <p>C</p>
            </button>
            <button class="operation-bttn" type="button" id="clear-entry-button">
                <p>CE</p>
            </button>
            <button class="operation-bttn" type="button" id="add-button" value="+">
                <p>+</p>
            </button>
            <button class="operation-bttn" type="button" id="subtract-button" value="-">
                <p>-</p>
            </button>
            <button class="operation-bttn" type="button" id="multiply-button" value="x">
                <p>x</p>
            </button>
            <button class="operation-bttn" type="button" id="divide-button" value="/">
                <p>÷</p>
            </button>
        </section>
        <button id="equals-button" type="submit">
            <p>=</p>
        </button>
    </form>
</body>
</html>
